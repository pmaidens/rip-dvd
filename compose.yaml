name: rip-dvd

x-runtime-environment: &runtime-environment
  RIP_DVD_DATABASE_PATH: /data/rip-dvd.sqlite
  RIP_DVD_MEDIA_LIBRARY_PATH: /media/movies
  RIP_DVD_ORIGINALS_LIBRARY_PATH: /media/originals
  RIP_DVD_ARCHIVE_DEVICE_PATH: ${RIP_DVD_ARCHIVE_DEVICE_PATH:-/dev/sr0}
  RIP_DVD_WORKER_POLL_INTERVAL_MS: ${RIP_DVD_WORKER_POLL_INTERVAL_MS:-5000}
  RIP_DVD_ARCHIVE_WORKER_CONCURRENCY: ${RIP_DVD_ARCHIVE_WORKER_CONCURRENCY:-1}
  RIP_DVD_ENCODE_WORKER_CONCURRENCY: ${RIP_DVD_ENCODE_WORKER_CONCURRENCY:-1}

services:
  validation:
    profiles: ["validation"]
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      target: validation
    command: ["true"]

  web:
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      target: web
    environment: *runtime-environment
    ports:
      - "${RIP_DVD_WEB_PORT:-3000}:3000"
    volumes:
      - rip-dvd-data:/data
      - ${RIP_DVD_MEDIA_LIBRARY_HOST_PATH:-rip-dvd-media}:/media/movies:ro
      - ${RIP_DVD_ORIGINALS_LIBRARY_HOST_PATH:-rip-dvd-originals}:/media/originals:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  archive-worker:
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      target: archive-worker
    environment: *runtime-environment
    volumes:
      - rip-dvd-data:/data
      - ${RIP_DVD_ORIGINALS_LIBRARY_HOST_PATH:-rip-dvd-originals}:/media/originals
    restart: unless-stopped

  encode-worker:
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      target: encode-worker
    environment: *runtime-environment
    volumes:
      - rip-dvd-data:/data
      - ${RIP_DVD_MEDIA_LIBRARY_HOST_PATH:-rip-dvd-media}:/media/movies
      - ${RIP_DVD_ORIGINALS_LIBRARY_HOST_PATH:-rip-dvd-originals}:/media/originals:ro
    restart: unless-stopped

volumes:
  rip-dvd-data:
  rip-dvd-media:
  rip-dvd-originals:
